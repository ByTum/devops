# 🌟 1. ประกาศกลุ่มโครงข่าย NestJS ที่จะช่วยกันรับแรงกระแทก
upstream nestjs_cluster {
    server api-service:3000; # ชี้ไปที่ชื่อ service ใน docker compose
}

server {
    listen 80;
    server_name api.nestjs.local nestjs.local;

    location / {
        # 🌟 2. เปลี่ยนจากส่งให้เครื่องเดียว เป็นส่งเข้ากลุ่ม cluster แทน
        proxy_pass http://nestjs_cluster;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
