name: NestJS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*' # 🔥 เพิ่มตรงนี้: สั่งให้รันเมื่อมีการสร้าง Git Tag ที่ขึ้นต้นด้วย v เช่น v1.0.0
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    # ... (ส่วนนี้ใช้โค้ดรันเทสเดิมทั้งหมด ไม่ต้องแก้ไขอะไรครับ) ...
    runs-on: ubuntu-latest
    services:
      postgres-test-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js env
        uses: actions/setup-node@v4
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run End-to-End Tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpassword
          DB_NAME: test_db
      - name: Test Build Production
        run: npm run build

  # --- 🚀 JOB 2: สั่ง Build และ Push Docker Image (CD) ---
  continuous-deployment:
    runs-on: ubuntu-latest
    needs: continuous-integration
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 🔥 ขั้นตอนที่ 1: ติดตั้ง QEMU (จำเป็นมากเพื่อให้เครื่อง Linux ของ GitHub สามารถบิ้วข้ามสายพันธุ์ไป ARM64 ได้)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # ล็อกอิน Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ตั้งค่า Docker Buildx สำหรับบิ้วขั้นสูง
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ขั้นตอนการ Build และสั่ง Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 🔥 ขั้นตอนที่ 2: ระบุแพลตฟอร์มที่ต้องการบิ้วคู่กัน (คั่นด้วยเครื่องหมายจุลภาค)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
