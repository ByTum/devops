name: NestJS CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    # 🛠️ 1. สั่งเปิดฐานข้อมูลจำลอง (PostgreSQL) สำหรับใช้รันเทส
    services:
      postgres-test-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        # เปิดพอร์ต 5432 ของ Container ให้เครื่องจำลอง (Runner) เรียกใช้ได้
        ports:
          - 5432:5432
        # ตั้งค่าให้ตรวจสอบว่าฐานข้อมูลพร้อมทำงานจริง ๆ ก่อนเริ่มขั้นตอนถัดไป
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js env
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      # 🛠️ 2. สั่งรัน E2E Test (หรือ Integration Test) ควบคู่กับการส่ง Env
      - name: Run End-to-End Tests
        run: npm run test:e2e
        env:
          # ใส่ค่าให้ตรงกับส่วน services ด้านบนเพื่อให้ NestJS ต่อเข้าฐานข้อมูลจำลองได้ถูกตัว
          NODE_ENV: test
          DB_HOST: localhost # บน GitHub Actions เครื่องจำลองคุยกับ Service ผ่าน localhost ได้เลย
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpassword
          DB_NAME: test_db

      - name: Test Build Production
        run: npm run build
