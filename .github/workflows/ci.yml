name: NestJS CI Pipeline

# 1. กำหนดเหตุการณ์ (Events) ที่จะให้ Pipeline นี้ทำงาน
on:
  push:
    branches: [ main, develop ] # รันเมื่อมีการ push ขึ้น branch main หรือ develop
  pull_request:
    branches: [ main ]         # รันเมื่อมีการเปิด Pull Request เข้าหา branch main

# 2. รายงานขั้นตอนการทำงาน (Jobs)
jobs:
  continuous-integration:
    runs-on: ubuntu-latest # ใช้เครื่อง Server จำลองของ GitHub (เป็น Linux) ในการรัน

    steps:
      # ขั้นตอนที่ 1: ดึงโค้ดจาก Repo ของเราลงมาในเครื่องจำลอง
      - name: Checkout source code
        uses: actions/checkout@v4

      # ขั้นตอนที่ 2: ติดตั้ง Node.js ในเครื่องจำลอง (เลือกเวอร์ชันให้ตรงกับที่ระบุใน Dockerfile)
      - name: Setup Node.js env
        uses: actions/setup-node@v4
        with:
          node-node-version: 20
          cache: 'npm' # ช่วยจำค่า node_modules ไว้ทำให้การรันครั้งต่อไปเร็วขึ้น

      # ขั้นตอนที่ 3: ติดตั้ง Dependencies ทั้งหมดของ NestJS
      - name: Install dependencies
        run: npm ci

      # ขั้นตอนที่ 4: ตรวจสอบ Format โค้ดด้วย Linter (Best Practice ของการตรวจคุณภาพโค้ด)
      - name: Run ESLint
        run: npm run lint

      # ขั้นตอนที่ 5: สั่งรัน Unit Test อัตโนมัติ
      - name: Run Unit Tests
        run: npm run test

      # ขั้นตอนที่ 6: ทดลอง Build โปรเจกต์ เพื่อให้มั่นใจว่า TypeScript คอมไพล์ผ่าน ไม่มี Error
      - name: Test Build Production
        run: npm run build
