name: NestJS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*' # 🔥 เพิ่มตรงนี้: สั่งให้รันเมื่อมีการสร้าง Git Tag ที่ขึ้นต้นด้วย v เช่น v1.0.0
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    # ... (ส่วนนี้ใช้โค้ดรันเทสเดิมทั้งหมด ไม่ต้องแก้ไขอะไรครับ) ...
    runs-on: ubuntu-latest
    services:
      postgres-test-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Setup Node.js env
        uses: actions/setup-node@v4
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Run End-to-End Tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: testuser
          DB_PASSWORD: testpassword
          DB_NAME: test_db
      - name: Test Build Production
        run: npm run build

  # --- 🚀 JOB 2: สั่ง Build และสแกนความปลอดภัย ก่อน Push (DevSecOps) ---
  continuous-deployment:
    runs-on: ubuntu-latest
    needs: continuous-integration
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 🛠️ ขั้นตอนที่ 1: สั่งบิ้ว Image มาเก็บไว้ในเครื่องจำลองก่อน (ยังไม่พุชขึ้น Docker Hub)
      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true # สั่งให้โหลด Image เก็บไว้ในตัว Runner ของ GitHub เองก่อน
          tags: nestjs-api:local-test

      # 🛡️ ขั้นตอนที่ 2: ใช้ TRIVY สแกนหาช่องโหว่ (หัวใจของ DevSecOps)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nestjs-api:local-test'
          format: 'table'
          exit-code: '1' # 🔥 สำคัญมาก: สั่งให้ท่อพัง (Exit code 1) ถ้าเจอช่องโหว่ตามเงื่อนไขด้านล่าง
          ignore-unfixed: true # มองข้ามช่องโหว่ที่ยังไม่มีแพตช์แก้ (เพื่อไม่ให้ขัดขวางการทำงานที่แก้ไม่ได้)
          vuln-type: 'os,library' # ตรวจทั้งตัวระบบปฏิบัติการ (Alpine) และ Package ใน package.json
          severity: 'CRITICAL' # 🚨 สั่งบล็อกเฉพาะช่องโหว่ระดับอันตรายสูงสุดเท่านั้น

      # --- ด่านตรวจผ่านแล้ว ถึงจะยอมให้ทำงานด้านล่างต่อ ---

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🛠️ ขั้นตอนที่ 3: บิ้วจริงแบบ Multi-platform และพุชขึ้น Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
